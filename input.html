<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CodeLens AI — Paste code or enter a GitHub repository URL for AI-powered code analysis.">
  <title>New Review — CodeLens AI</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold'%3E%26lt;/%26gt;%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- Highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme-dark">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme-light">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-shell">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">&lt;/&gt;</div>
        <div class="sidebar-brand">
          <span class="sidebar-brand-name">CodeLens AI</span>
          <span class="sidebar-brand-tagline">Code Review</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Menu</div>
          <a href="dashboard.html" class="nav-item">
            <span class="nav-item-icon">📊</span>
            <span class="nav-item-text">Dashboard</span>
          </a>
          <a href="input.html" class="nav-item active">
            <span class="nav-item-icon">✏️</span>
            <span class="nav-item-text">New Review</span>
          </a>
          <a href="history.html" class="nav-item">
            <span class="nav-item-icon">📋</span>
            <span class="nav-item-text">History</span>
          </a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Admin</div>
          <a href="admin.html" class="nav-item nav-admin" style="display:none;">
            <span class="nav-item-icon">⚙️</span>
            <span class="nav-item-text">Admin Panel</span>
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar"></div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">Loading...</div>
            <div class="sidebar-user-email">...</div>
          </div>
        </div>
        <a href="#" class="nav-item sign-out-btn" style="margin-top: 8px;">
          <span class="nav-item-icon">🚪</span>
          <span class="nav-item-text">Sign Out</span>
        </a>
      </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- MAIN -->
    <main class="app-main" id="appMain">
      <header class="navbar">
        <div class="navbar-left">
          <button class="btn-icon mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open'); document.getElementById('mobileOverlay').classList.toggle('active');" aria-label="Open menu">☰</button>
          <h1 class="navbar-title">New Code Review</h1>
        </div>
        <div class="navbar-right">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
        </div>
      </header>

      <div class="workspace-layout" id="workspaceContainer">
        <!-- Input Pane (Left Side) -->
        <div class="workspace-pane input-pane page-content page-enter" id="workspaceInputPane">
        <!-- Review Title -->
        <div class="form-group">
          <label class="form-label" for="reviewTitle">Review Title</label>
          <input type="text" id="reviewTitle" class="form-input review-title-input" placeholder="e.g., Auth Module Refactor" maxlength="100">
        </div>

        <!-- Input Method Tabs -->
        <div class="input-tabs">
          <div class="tabs">
            <button class="tab-btn active" data-tab="paste" onclick="switchInputTab('paste')">📝 Paste Code</button>
            <button class="tab-btn" data-tab="github" onclick="switchInputTab('github')">🐙 GitHub Repo</button>
          </div>
        </div>

        <!-- TAB: Paste Code -->
        <div class="tab-content active" id="tab-paste">
          <div class="code-input-container">
            <div class="language-selector">
              <label class="form-label" for="langSelect" style="margin-bottom:0;">Language:</label>
              <select id="langSelect" class="form-select" style="width:auto;min-width:160px;">
                <!-- Populated by JS -->
              </select>
            </div>

            <textarea id="codeTextarea" class="form-textarea" placeholder="Paste your code here..." spellcheck="false" style="font-family: var(--font-mono); tab-size: 4;"></textarea>

            <div class="submit-area">
              <span class="code-info" id="codeInfo">0 characters · 0 lines</span>
              <button class="btn btn-primary btn-lg" id="analyzeBtn" onclick="handleAnalyze()">
                <span>🔍</span> Analyze Code
              </button>
            </div>
          </div>
        </div>

        <!-- TAB: GitHub Repo -->
        <div class="tab-content" id="tab-github">
          <div class="code-input-container">
            <div class="form-group">
              <label class="form-label" for="githubUrl">GitHub Repository URL</label>
              <div class="github-input-row">
                <input type="url" id="githubUrl" class="form-input" placeholder="https://github.com/owner/repo">
                <button class="btn btn-secondary" id="fetchRepoBtn" onclick="handleFetchRepo()">
                  <span>📥</span> Fetch Files
                </button>
              </div>
              <small class="text-tertiary">Public repositories only. Example: https://github.com/facebook/react</small>
            </div>

            <!-- File Tree -->
            <div id="fileTreeContainer" style="display:none;">
              <div class="form-group">
                <label class="form-label">Select a file to review:</label>
                <div class="file-tree" id="fileTree"></div>
              </div>

              <!-- Code Preview -->
              <div id="codePreviewContainer" style="display:none;">
                <div class="code-preview">
                  <div class="code-preview-header">
                    <span id="previewFileName">file.js</span>
                    <span class="badge badge-neutral" id="previewLang">JavaScript</span>
                  </div>
                  <div class="code-preview-body">
                    <pre><code id="codePreviewBlock"></code></pre>
                  </div>
                </div>

                <div class="submit-area">
                  <span class="code-info" id="githubCodeInfo">0 characters</span>
                  <button class="btn btn-primary btn-lg" id="analyzeGithubBtn" onclick="handleAnalyzeGithub()">
                    <span>🔍</span> Analyze This File
                  </button>
                </div>
              </div>
            </div>
            </div>
          </div>
        </div>
        
        <!-- Results Pane (Right Side) -->
        <div class="workspace-pane results-pane page-content" id="workspaceResultsPane" style="display:none; padding-top:0;">
          <div id="resultsLoading" style="display:none;">
            <div class="skeleton skeleton-card" style="height:160px;margin-bottom:24px;"></div>
            <div class="skeleton skeleton-card" style="height:200px;margin-bottom:24px;"></div>
            <div class="skeleton skeleton-card" style="height:150px;"></div>
          </div>
          <div id="resultsBody" style="display:none;"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/results.js"></script>
  <script src="js/input.js"></script>
</body>
</html>
